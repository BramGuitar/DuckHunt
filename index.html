<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Duck Hunt" />
  <meta name="theme-color" content="#2d7eac" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Duck Hunting Mobile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="hud" aria-label="Game HUD">
      <div class="hud-item">Score: <span id="score">0</span></div>
      <div class="hud-item">Best: <span id="highScore">0</span></div>
      <div class="hud-item">Time: <span id="time">45</span>s</div>
      <div class="hud-item">Misses: <span id="misses">0</span></div>
      <div class="hud-item">Combo: <span id="combo">x1</span></div>
      <div class="hud-item">Level: <span id="level">1</span></div>
      <div class="hud-item">Shields: <span id="shields">0</span></div>
      <div class="hud-item">Accuracy: <span id="accuracy">0%</span></div>
      <div class="hud-item">Effects: <span id="effects">None</span></div>
    </header>

    <section id="gameArea" class="game-area" aria-label="Duck hunting game area">
      <div id="message" class="message"></div>
      <div id="crosshair" class="crosshair" aria-hidden="true"></div>
      <div id="toast" class="toast" aria-live="polite"></div>
    </section>

    <footer class="controls" aria-label="Game controls">
      <button id="pauseBtn" type="button" disabled>Pause</button>
      <button id="restartBtn" type="button" disabled>Restart</button>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
